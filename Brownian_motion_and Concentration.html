<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Brownian Motion and Concentration</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        canvas {
            border: 1px solid #ccc;
            background: white;
        }

        .panel {
            width: 720px;
            background: white;
            margin-top: 10px;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .row {
            margin-bottom: 8px;
        }

        input {
            width: 120px;
        }

        .stat {
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>ブラウン運動・濃度・ポアソン統計</h2>

    <canvas id="canvas" width="720" height="500"></canvas>

    <div class="panel">

        <div class="row">
            初期粒子数 N0:
            <input id="n0Input" type="number" value="10000">
        </div>

        <div class="row">
            拡散係数 D [m²/s]:
            <input id="dInput" type="number" step="0.00001" value="0.00002">
        </div>

        <div class="row">
            格子幅 dx [m]:
            <input id="dxInput" type="number" step="0.001" value="0.01">
        </div>

        <div class="row">
            時間刻み dt [s]:
            <input id="dtInput" type="number" step="0.01" value="0.1">
        </div>

        <button onclick="initializeSimulation()">
            初期化
        </button>

        <button onclick="togglePause()">
            一時停止 / 再開
        </button>

        <hr>

        <div class="row stat">
            時間:
            <span id="timeLabel">0.0</span> s
        </div>

        <div class="row stat">
            総粒子数:
            <span id="particleLabel">0</span>
        </div>

        <div class="row stat">
            平均粒子数:
            <span id="meanLabel">0</span>
        </div>

        <div class="row stat">
            分散:
            <span id="varLabel">0</span>
        </div>

        <div class="row stat">
            Var / Mean:
            <span id="ratioLabel">0</span>
        </div>

        <div class="row stat">
            最大濃度:
            <span id="maxConcLabel">0</span>
            particles/m²
        </div>

        <div class="row stat">
            状態:
            <span id="pauseLabel">RUNNING</span>
        </div>

    </div>

    <script>

        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        const GRID_PIXEL = 20;

        const COLS =
            Math.floor(canvas.width / GRID_PIXEL);

        const ROWS =
            Math.floor(canvas.height / GRID_PIXEL);

        let particles = [];

        let D = 2.0e-5;
        let DX = 0.01;
        let DT = 0.1;

        let sigmaPixel = 1.0;

        let simTime = 0;

        let paused = false;

        function gaussianRandom() {

            let u1 = Math.random();

            let u2 = Math.random();

            return Math.sqrt(
                -2.0 * Math.log(u1)
            ) * Math.cos(
                2.0 * Math.PI * u2
            );
        }

        function initializeSimulation() {

            particles = [];

            simTime = 0;

            paused = false;

            document.getElementById(
                "pauseLabel"
            ).innerText = "RUNNING";

            const N0 =
                parseInt(
                    document.getElementById(
                        "n0Input"
                    ).value
                );

            D =
                parseFloat(
                    document.getElementById(
                        "dInput"
                    ).value
                );

            DX =
                parseFloat(
                    document.getElementById(
                        "dxInput"
                    ).value
                );

            DT =
                parseFloat(
                    document.getElementById(
                        "dtInput"
                    ).value
                );

            // ブラウン運動標準偏差 [m]
            const sigmaMeters =
                Math.sqrt(
                    2.0 * D * DT
                );

            // ピクセルへ変換
            sigmaPixel =
                sigmaMeters
                / DX
                * GRID_PIXEL;

            // 中央格子
            const centerGX =
                Math.floor(COLS / 2);

            const centerGY =
                Math.floor(ROWS / 2);

            const x0 =
                centerGX * GRID_PIXEL;

            const y0 =
                centerGY * GRID_PIXEL;

            // 初期粒子配置
            // 中央格子内へ一様ランダム配置
            for (let i = 0; i < N0; i++) {

                particles.push({

                    x:
                        x0
                        + Math.random()
                        * GRID_PIXEL,

                    y:
                        y0
                        + Math.random()
                        * GRID_PIXEL
                });
            }
        }

        function togglePause() {

            paused = !paused;

            document.getElementById(
                "pauseLabel"
            ).innerText =
                paused
                    ? "PAUSED"
                    : "RUNNING";
        }

        function updateParticles() {

            particles.forEach(p => {

                p.x +=
                    gaussianRandom()
                    * sigmaPixel;

                p.y +=
                    gaussianRandom()
                    * sigmaPixel;
            });

            // 開放境界
            particles =
                particles.filter(p =>

                    p.x >= 0 &&
                    p.x < canvas.width &&

                    p.y >= 0 &&
                    p.y < canvas.height
                );
        }

        function computeGrid() {

            const grid =
                Array(COLS * ROWS).fill(0);

            particles.forEach(p => {

                const gx =
                    Math.floor(
                        p.x / GRID_PIXEL
                    );

                const gy =
                    Math.floor(
                        p.y / GRID_PIXEL
                    );

                if (
                    gx >= 0 &&
                    gx < COLS &&
                    gy >= 0 &&
                    gy < ROWS
                ) {

                    grid[
                        gx + gy * COLS
                    ]++;
                }
            });

            return grid;
        }

        function computeStatistics(grid) {

            const nCells = grid.length;

            let sum = 0;

            for (let i = 0; i < nCells; i++) {

                sum += grid[i];
            }

            const mean =
                sum / nCells;

            let variance = 0;

            for (let i = 0; i < nCells; i++) {

                variance +=
                    (grid[i] - mean)
                    *
                    (grid[i] - mean);
            }

            variance /= nCells;

            return {
                mean: mean,
                variance: variance
            };
        }

        function draw(grid) {

            ctx.clearRect(
                0,
                0,
                canvas.width,
                canvas.height
            );

            const cellArea =
                DX * DX;

            const maxCount =
                Math.max(...grid);

            let maxConcentration = 0;

            // 濃度描画
            for (let i = 0; i < grid.length; i++) {

                const count = grid[i];

                if (count <= 0) continue;

                const concentration =
                    count / cellArea;

                if (
                    concentration >
                    maxConcentration
                ) {
                    maxConcentration =
                        concentration;
                }

                const normalized =
                    count / maxCount;

                const hue =
                    240
                    - 240 * normalized;

                ctx.fillStyle =
                    `hsla(${hue},80%,50%,0.65)`;

                const x =
                    (i % COLS)
                    * GRID_PIXEL;

                const y =
                    Math.floor(i / COLS)
                    * GRID_PIXEL;

                ctx.fillRect(
                    x,
                    y,
                    GRID_PIXEL,
                    GRID_PIXEL
                );
            }

            // 粒子描画
            ctx.fillStyle =
                "rgba(0,0,0,0.5)";

            particles.forEach(p => {

                ctx.beginPath();

                ctx.arc(
                    p.x,
                    p.y,
                    1.0,
                    0,
                    2.0 * Math.PI
                );

                ctx.fill();
            });

            document.getElementById(
                "maxConcLabel"
            ).innerText =
                maxConcentration.toFixed(2);
        }

        function updateLabels(stats) {

            document.getElementById(
                "timeLabel"
            ).innerText =
                simTime.toFixed(2);

            document.getElementById(
                "particleLabel"
            ).innerText =
                particles.length;

            document.getElementById(
                "meanLabel"
            ).innerText =
                stats.mean.toFixed(6);

            document.getElementById(
                "varLabel"
            ).innerText =
                stats.variance.toFixed(6);

            let ratio = 0;

            if (stats.mean > 0) {

                ratio =
                    stats.variance
                    / stats.mean;
            }

            document.getElementById(
                "ratioLabel"
            ).innerText =
                ratio.toFixed(6);
        }

        function animate() {

            if (!paused) {

                simTime += DT;

                updateParticles();
            }

            const grid =
                computeGrid();

            const stats =
                computeStatistics(grid);

            draw(grid);

            updateLabels(stats);

            requestAnimationFrame(
                animate
            );
        }

        initializeSimulation();

        animate();

    </script>

</body>
</html>
