<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>NACA O-Grid FDM Solver</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #fafafa;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 10px 20px;
        }

        .container {
            max-width: 1450px;
            margin: 0 auto;
        }

        h1 {
            font-size: 22px;
            color: #222;
            margin-bottom: 5px;
        }

        p {
            font-size: 13px;
            color: #666;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .control-panel {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .control-group {
            text-align: left;
            flex: 1;
            min-width: 130px;
        }

        .aoa-group {
            border-left: 3px solid #e67e22;
            padding-left: 10px;
        }

        .highlight-group {
            border-left: 3px solid #e74c3c;
            padding-left: 10px;
        }

        .grid-group {
            border-left: 3px solid #3498db;
            padding-left: 10px;
        }

        .diag-group {
            border-left: 3px solid #2ecc71;
            padding-left: 10px;
        }

        .elliptic-group {
            border-left: 3px solid #9b59b6;
            padding-left: 10px;
        }

        .cfd-group {
            border-left: 3px solid #f39c12;
            padding-left: 10px;
        }

        label {
            font-weight: bold;
            font-size: 11px;
            display: block;
            margin-bottom: 5px;
            color: #555;
        }

        input[type="number"], input[type="range"], select, button {
            width: 100%;
            box-sizing: border-box;
        }

        input[type="number"], select, button {
            padding: 6px;
            font-size: 13px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: white;
        }

        button {
            background: #9b59b6;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

            button:hover {
                background: #8e44ad;
            }

            button:active {
                background: #7d3c98;
            }

        .btn-cfd {
            background: #e67e22;
        }

            .btn-cfd:hover {
                background: #d35400;
            }

        .range-container {
            display: flex;
            align-items: center;
            gap: 5px;
        }

            .range-container input[type="number"] {
                width: 60px;
                padding: 3px;
                font-size: 11px;
            }

        canvas {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.08);
            max-width: 100%;
            height: auto;
            cursor: grab;
        }

            canvas:active {
                cursor: grabbing;
            }
    </style>
</head>
<body>

    <div class="container">
        <h1>NACA O-Grid FDM Solver</h1>
        <p>レギュラー格子、移流項：3次精度風上、粘性項：陰解法、圧力ポアソン方程式：多方向差分によるチェッカーボード振動抑制</p>

        <div class="control-panel">
            <div class="control-group diag-group">
                <label for="viewModeSelect">表示モード:</label>
                <select id="viewModeSelect">
                    <option value="meshOnly">通常のメッシュ線のみ</option>
                    <option value="velocity" selected>流速絶対値 (Velocity Magnitude)</option>
                    <option value="pressure">圧力場 (Pressure Field)</option>
                    <option value="cfl">クーラン数分布 (Courant Number Map)</option>
                    <option value="diffusion">拡散数分布 (Diffusion Number Map)</option>
                    <option value="orthoSkew">直交性歪み (Orthogonal Skewness)</option>
                    <option value="aspectRatio">アスペクト比 (Aspect Ratio)</option>
                </select>
            </div>

            <div class="control-group aoa-group">
                <label for="aoaRange">迎角 Alpha (度):</label>
                <div class="range-container">
                    <input type="range" id="aoaRange" min="-20" max="30" step="0.5" value="8.0">
                    <input type="number" id="aoaNum" min="-20" max="30" step="0.5" value="8.0">
                </div>
            </div>

            <div class="control-group cfd-group">
                <label>CFDシミュレーション:</label>
                <button id="toggleCfdBtn" class="btn-cfd">CFD計算 開始</button>
                <button id="resetCfdBtn" style="margin-top:5px; background:#7f8c8d;">CFDリセット</button>
            </div>

            <div class="control-group cfd-group">
                <label for="reInput">Re (レイノルズ数):</label>
                <input type="number" id="reInput" min="1000" max="10000000" step="1000" value="10000">
                <label for="dtInput" style="margin-top:5px;">dt (時間刻み幅):</label>
                <input type="number" id="dtInput" min="0.00001" max="0.01" step="0.00001" value="0.0002">
            </div>

            <div class="control-group elliptic-group">
                <label>楕円方程式格子最適化:</label>
                <button id="solveEllipticBtn">ポアソン方程式を反復緩和</button>
            </div>

            <div class="control-group grid-group">
                <label for="imaxInput">IMAX (半径方向数):</label>
                <input type="number" id="imaxInput" min="40" max="200" value="60">
            </div>
            <div class="control-group grid-group">
                <label for="jmaxInput">JMAX (周方向数):</label>
                <input type="number" id="jmaxInput" min="80" max="400" value="120">
            </div>

            <div class="control-group grid-group">
                <label for="drRange">DR (第一格子幅):</label>
                <div class="range-container">
                    <input type="range" id="drRange" min="0.0001" max="0.01" step="0.0001" value="0.002">
                    <input type="number" id="drNum" min="0.0001" max="0.01" step="0.0001" value="0.002">
                </div>
            </div>

            <div class="control-group grid-group">
                <label for="psiInput">PSI (格子幅成長率):</label>
                <div class="range-container">
                    <input type="range" id="psiInput" min="1.01" max="1.25" step="0.01" value="1.12">
                    <input type="number" id="psiNum" min="1.00" max="1.50" step="0.01" value="1.12">
                </div>
            </div>

            <div class="control-group highlight-group">
                <label for="mInput">M (最大キャンバー %):</label>
                <input type="number" id="mInput" min="0" max="9" step="1" value="2">
            </div>
            <div class="control-group highlight-group">
                <label for="pInput">P (キャンバー位置 0.1倍):</label>
                <input type="number" id="pInput" min="0" max="9" step="1" value="4">
            </div>
            <div class="control-group highlight-group">
                <label for="xxInput">XX (最大肉厚 %):</label>
                <input type="number" id="xxInput" min="1" max="99" step="1" value="15">
            </div>
        </div>

        <canvas id="gridCanvas" width="800" height="800"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');

        const viewModeSelect = document.getElementById('viewModeSelect');
        const solveEllipticBtn = document.getElementById('solveEllipticBtn');
        const toggleCfdBtn = document.getElementById('toggleCfdBtn');
        const resetCfdBtn = document.getElementById('resetCfdBtn');

        const reInput = document.getElementById('reInput');
        const dtInput = document.getElementById('dtInput');
        const aoaRange = document.getElementById('aoaRange');
        const aoaNum = document.getElementById('aoaNum');

        const imaxInput = document.getElementById('imaxInput');
        const jmaxInput = document.getElementById('jmaxInput');
        const drRange = document.getElementById('drRange');
        const drNum = document.getElementById('drNum');
        const psiInput = document.getElementById('psiInput');
        const psiNum = document.getElementById('psiNum');
        const mInput = document.getElementById('mInput');
        const pInput = document.getElementById('pInput');
        const xxInput = document.getElementById('xxInput');

        let scale = 260.0;
        let offsetX = canvas.width / 2 - 50;
        let offsetY = canvas.height / 2;
        let isDragging = false;
        let startX = 0;
        let startY = 0;

        // 格子データ
        let imax = 0, jmax = 0;
        let gridX = null, gridY = null;

        // CFD流体場データ
        let uFlow = null;
        let vFlow = null;
        let pFlow = null;
        let uFlowTmp = null, vFlowTmp = null, pCorr = null;

        // 幾何学メトリック
        let metrics = null;

        // CFD設定パラメータ
        let isCfdRunning = false;
        let dt = 0.0005;
        let Re = 100000;
        const U_inf = 1.0;
        let Alpha_AoA = 8.0 * Math.PI / 180.0;

        // AB2用: 1ステップ前の移流項を保存
        let convU_old = null;
        let convV_old = null;
        let isFirstStep = true;

        // モニタリング用最大値記録変数
        let maxCflGlobal = 0.0;
        let maxDiffGlobal = 0.0;

        // 翼の前縁位置（回転の物理中心基準点）
        const rotCenterX = -0.4;
        const rotCenterY = 0.0;

        function updateCfdParamsFromUi() {
            Re = Math.max(1000, parseFloat(reInput.value) || 10000);
            dt = Math.max(0.00001, parseFloat(dtInput.value) || 0.0005);
            const deg = parseFloat(aoaNum.value) || 0.0;
            Alpha_AoA = deg * Math.PI / 180.0;
        }

        const getIdx = (i, j) => {
            const period = jmax - 1;
            let wrapJ = j % period;
            if (wrapJ < 0) wrapJ += period;
            return i * jmax + wrapJ;
        };

        function calculateNacaGeometry(x_norm, m, p, xx) {
            const t = xx / 100.0;
            const a0 = 0.2969, a1 = -0.1260, a2 = -0.3516, a3 = 0.2843, a4 = -0.1036;
            const yt = 5.0 * t * (a0 * Math.sqrt(x_norm) + a1 * x_norm + a2 * x_norm ** 2 + a3 * x_norm ** 3 + a4 * x_norm ** 4);
            let yc = 0.0, dyc_dx = 0.0;
            if (m > 0 && p > 0) {
                const mc = m / 100.0, pc = p / 10.0;
                if (x_norm <= pc) {
                    yc = (mc / pc ** 2) * (2.0 * pc * x_norm - x_norm ** 2);
                    dyc_dx = ((2.0 * mc) / pc ** 2) * (pc - x_norm);
                } else {
                    yc = (mc / (1.0 - pc) ** 2) * ((1.0 - 2.0 * pc) + 2.0 * pc * x_norm - x_norm ** 2);
                    dyc_dx = ((2.0 * mc) / (1.0 - pc) ** 2) * (pc - x_norm);
                }
            }
            return { yc, yt, theta_c: Math.atan(dyc_dx) };
        }

        function generateInitialAlgebraicGrid() {
            imax = Math.max(5, parseInt(imaxInput.value) || 60);
            jmax = Math.max(8, parseInt(jmaxInput.value) || 120);

            const dr = parseFloat(drNum.value) || 0.003;
            const psi = parseFloat(psiNum.value) || 1.11;
            const m = parseInt(mInput.value) || 0;
            const p = parseInt(pInput.value) || 0;
            const xx = parseInt(xxInput.value) || 12;

            gridX = new Float64Array(imax * jmax);
            gridY = new Float64Array(imax * jmax);

            for (let j = 0; j < jmax; j++) {
                const theta = 2.0 * Math.PI * j / (jmax - 1);
                let x_norm = 0.5 * (1.0 + Math.cos(theta));
                let is_upper = (theta <= Math.PI);
                const geo = calculateNacaGeometry(x_norm, m, p, xx);

                let x_surf, y_surf;
                if (is_upper) {
                    x_surf = x_norm - geo.yt * Math.sin(geo.theta_c);
                    y_surf = geo.yc + geo.yt * Math.cos(geo.theta_c);
                } else {
                    x_surf = x_norm + geo.yt * Math.sin(geo.theta_c);
                    y_surf = geo.yc - geo.yt * Math.cos(geo.theta_c);
                }
                x_surf = (x_surf - 0.4) * 1.0;
                y_surf = y_surf * 1.0;

                const nx = Math.cos(theta);
                const ny = Math.sin(theta);

                let current_r = 0.0;
                for (let i = 0; i < imax; i++) {
                    if (i > 0) current_r += dr * Math.pow(psi, i - 1);
                    const idx = i * jmax + j;
                    gridX[idx] = x_surf + nx * current_r;
                    gridY[idx] = y_surf + ny * current_r;
                }
            }
            initCfdBuffers();
        }

        function smoothGridElliptic(iterations = 50) {
            const w = 1.2;

            // 壁面への集中度を制御するパラメータ
            // A_strength: 引き付けの強さ。大きくすると壁面に格子が張り付きます。
            // B_decay: 離れたときの減衰率。小さくすると遠くまで効果が及びます。
            const A_strength = 0.01;
            const B_decay = 0.005;

            for (let iter = 0; iter < iterations; iter++) {
                for (let i = 1; i < imax - 1; i++) {
                    for (let j = 0; j < jmax - 1; j++) {
                        const idx = getIdx(i, j);
                        const idx_ip = getIdx(i + 1, j), idx_im = getIdx(i - 1, j);
                        const idx_jp = getIdx(i, j + 1), idx_jm = getIdx(i, j - 1);
                        const idx_ipjp = getIdx(i + 1, j + 1), idx_ipjm = getIdx(i + 1, j - 1);
                        const idx_imjp = getIdx(i - 1, j + 1), idx_imjm = getIdx(i - 1, j - 1);

                        // 1階微分 (ξ方向: i, η方向: j)
                        const x_xi = 0.5 * (gridX[idx_ip] - gridX[idx_im]);
                        const y_xi = 0.5 * (gridY[idx_ip] - gridY[idx_im]);
                        const x_eta = 0.5 * (gridX[idx_jp] - gridX[idx_jm]);
                        const y_eta = 0.5 * (gridY[idx_jp] - gridY[idx_jm]);

                        // メトリック係数
                        const alpha = x_eta * x_eta + y_eta * y_eta;
                        const beta = x_xi * x_eta + y_xi * y_eta;
                        const gamma = x_xi * x_xi + y_xi * y_xi;

                        // 2階混同微分
                        const x_xi_eta = 0.25 * (gridX[idx_ipjp] - gridX[idx_ipjm] - gridX[idx_imjp] + gridX[idx_imjm]);
                        const y_xi_eta = 0.25 * (gridY[idx_ipjp] - gridY[idx_ipjm] - gridY[idx_imjp] + gridY[idx_imjm]);

                        // 制御関数 (TTM法に基づくソース項)
                        // i=0(壁面)側に向かって格子を引き付けるため、Pは負の値をとる
                        const P = -A_strength * Math.exp(-B_decay * i);
                        const Q = 0.0;

                        const denominator = 2.0 * (alpha + gamma);
                        if (denominator === 0) continue;

                        // ポアソン方程式の差分化から導出した正しいターゲット座標
                        // 1階微分項(x_xi, x_eta)にソース項(P, Q)とメトリック、および差分係数0.5が正しく掛かるようにしています
                        const targetX = (
                            alpha * (gridX[idx_ip] + gridX[idx_im]) +
                            gamma * (gridX[idx_jp] + gridX[idx_jm]) -
                            2.0 * beta * x_xi_eta +
                            alpha * P * x_xi +
                            gamma * Q * x_eta
                        ) / denominator;

                        const targetY = (
                            alpha * (gridY[idx_ip] + gridY[idx_im]) +
                            gamma * (gridY[idx_jp] + gridY[idx_jm]) -
                            2.0 * beta * y_xi_eta +
                            alpha * P * y_xi +
                            gamma * Q * y_eta
                        ) / denominator;

                        // SOR法（継続的緩和）
                        gridX[idx] += w * (targetX - gridX[idx]);
                        gridY[idx] += w * (targetY - gridY[idx]);
                    }
                }

                // 周期的境界条件の同期処理 (j方向の接続面)
                for (let i = 0; i < imax; i++) {
                    gridX[i * jmax + (jmax - 1)] = gridX[i * jmax + 0];
                    gridY[i * jmax + (jmax - 1)] = gridY[i * jmax + 0];
                }
            }
            computeMetrics();
        }

        function computeMetrics() {
            const size = imax * jmax;
            metrics = {
                xi_x: new Float64Array(size), xi_y: new Float64Array(size),
                eta_x: new Float64Array(size), eta_y: new Float64Array(size),
                J: new Float64Array(size),
                alpha: new Float64Array(size), beta: new Float64Array(size), gamma: new Float64Array(size)
            };

            for (let i = 0; i < imax; i++) {
                for (let j = 0; j < jmax; j++) {
                    const idx = getIdx(i, j);
                    const ip = getIdx(Math.min(imax - 1, i + 1), j), im = getIdx(Math.max(0, i - 1), j);
                    const jp = getIdx(i, j + 1), jm = getIdx(i, j - 1);

                    const x_xi = 0.5 * (gridX[ip] - gridX[im]);
                    const y_xi = 0.5 * (gridY[ip] - gridY[im]);
                    const x_eta = 0.5 * (gridX[jp] - gridX[jm]);
                    const y_eta = 0.5 * (gridY[jp] - gridY[jm]);

                    const Jac = x_xi * y_eta - x_eta * y_xi;
                    metrics.J[idx] = Jac;

                    metrics.xi_x[idx] = y_eta / Jac;
                    metrics.xi_y[idx] = -x_eta / Jac;
                    metrics.eta_x[idx] = -y_xi / Jac;
                    metrics.eta_y[idx] = x_xi / Jac;

                    metrics.alpha[idx] = x_eta ** 2 + y_eta ** 2;
                    metrics.beta[idx] = x_xi * x_eta + y_xi * y_eta;
                    metrics.gamma[idx] = x_xi ** 2 + y_xi ** 2;
                }
            }
        }

        function initCfdBuffers() {
            const size = imax * jmax;
            uFlow = new Float64Array(size);
            vFlow = new Float64Array(size);
            pFlow = new Float64Array(size);
            uFlowTmp = new Float64Array(size);
            vFlowTmp = new Float64Array(size);
            pCorr = new Float64Array(size);

            updateCfdParamsFromUi();
            const u_init = U_inf * Math.cos(Alpha_AoA);
            const v_init = U_inf * Math.sin(Alpha_AoA);

            for (let i = 0; i < size; i++) {
                uFlow[i] = u_init;
                vFlow[i] = v_init;
                pFlow[i] = 0.0;
            }
            convU_old = new Float64Array(size);
            convV_old = new Float64Array(size);
            isFirstStep = true;
            maxCflGlobal = 0.0;
            maxDiffGlobal = 0.0;
            computeMetrics();
        }

        function computeStabilityParameters(idx) {
            const U = metrics.xi_x[idx] * uFlow[idx] + metrics.xi_y[idx] * vFlow[idx];
            const V = metrics.eta_x[idx] * uFlow[idx] + metrics.eta_y[idx] * vFlow[idx];
            const cfl = (Math.abs(U) + Math.abs(V)) * dt;

            const J2 = metrics.J[idx] ** 2;
            const diff = ((metrics.alpha[idx] + metrics.gamma[idx]) / (J2 * Re)) * dt;
            return { cfl, diff };
        }

        function stepFlowSolver() {
            updateCfdParamsFromUi();

            const size = imax * jmax;
            const u_inf_x = U_inf * Math.cos(Alpha_AoA);
            const u_inf_y = U_inf * Math.sin(Alpha_AoA);

            let localMaxCfl = 0.0;
            let localMaxDiff = 0.0;

            const rhsU = new Float64Array(size);
            const rhsV = new Float64Array(size);
            const convU_n = new Float64Array(size); // 現ステップの移流項（AB2用に保存）
            const convV_n = new Float64Array(size);

            // =====================================================================
            // Step 1: 陽的 RHS の構築
            //   移流項  : Adams-Bashforth 2次  (3/2)*C^n - (1/2)*C^{n-1}
            //   圧力勾配: 陽的 (旧値)
            //   粘性項  : Crank-Nicolson の陽的半分 (1/2)*Lap(u^n)
            // =====================================================================

            for (let i = 1; i < imax - 1; i++) {
                for (let j = 0; j < jmax - 1; j++) {

                    const idx = getIdx(i, j);

                    const stab = computeStabilityParameters(idx);
                    if (stab.cfl > localMaxCfl) localMaxCfl = stab.cfl;
                    if (stab.diff > localMaxDiff) localMaxDiff = stab.diff;

                    const U = metrics.xi_x[idx] * uFlow[idx] + metrics.xi_y[idx] * vFlow[idx];
                    const V = metrics.eta_x[idx] * uFlow[idx] + metrics.eta_y[idx] * vFlow[idx];

                    const ip = getIdx(i + 1, j), im = getIdx(i - 1, j);
                    const jp = getIdx(i, j + 1), jm = getIdx(i, j - 1);
                    const ipjp = getIdx(i + 1, j + 1), ipjm = getIdx(i + 1, j - 1);
                    const imjp = getIdx(i - 1, j + 1), imjm = getIdx(i - 1, j - 1);

                    // -------------------------------------------------
                    // 移流項 (修正済み 3次精度風上)
                    // -------------------------------------------------
                    let u_xi, v_xi, u_eta, v_eta;

                    if (i <= 1 || i >= imax - 2) {
                        u_xi = (U > 0.0) ? (uFlow[idx] - uFlow[im]) : (uFlow[ip] - uFlow[idx]);
                        v_xi = (U > 0.0) ? (vFlow[idx] - vFlow[im]) : (vFlow[ip] - vFlow[idx]);
                    } else {
                        const ipp = getIdx(i + 2, j), imm = getIdx(i - 2, j);
                        if (U > 0.0) {
                            u_xi = (2.0 * uFlow[ip] + 3.0 * uFlow[idx] - 6.0 * uFlow[im] + uFlow[imm]) / 6.0;
                            v_xi = (2.0 * vFlow[ip] + 3.0 * vFlow[idx] - 6.0 * vFlow[im] + vFlow[imm]) / 6.0;
                        } else {
                            u_xi = (-uFlow[ipp] + 6.0 * uFlow[ip] - 3.0 * uFlow[idx] - 2.0 * uFlow[im]) / 6.0;
                            v_xi = (-vFlow[ipp] + 6.0 * vFlow[ip] - 3.0 * vFlow[idx] - 2.0 * vFlow[im]) / 6.0;
                        }
                    }

                    const jpp = getIdx(i, j + 2), jmm = getIdx(i, j - 2);
                    if (V > 0.0) {
                        u_eta = (2.0 * uFlow[jp] + 3.0 * uFlow[idx] - 6.0 * uFlow[jm] + uFlow[jmm]) / 6.0;
                        v_eta = (2.0 * vFlow[jp] + 3.0 * vFlow[idx] - 6.0 * vFlow[jm] + vFlow[jmm]) / 6.0;
                    } else {
                        u_eta = (-uFlow[jpp] + 6.0 * uFlow[jp] - 3.0 * uFlow[idx] - 2.0 * uFlow[jm]) / 6.0;
                        v_eta = (-vFlow[jpp] + 6.0 * vFlow[jp] - 3.0 * vFlow[idx] - 2.0 * vFlow[jm]) / 6.0;
                    }

                    // 現ステップの移流項を保存（次ステップのAB2用）
                    convU_n[idx] = U * u_xi + V * u_eta;
                    convV_n[idx] = U * v_xi + V * v_eta;

                    // -------------------------------------------------
                    // Adams-Bashforth 2次
                    //   第1ステップのみ前進オイラー (C^{n-1} が存在しないため)
                    // -------------------------------------------------
                    const ab_u = isFirstStep
                        ? convU_n[idx]
                        : 1.5 * convU_n[idx] - 0.5 * convU_old[idx];
                    const ab_v = isFirstStep
                        ? convV_n[idx]
                        : 1.5 * convV_n[idx] - 0.5 * convV_old[idx];

                    // -------------------------------------------------
                    // 圧力勾配 (陽的)
                    // -------------------------------------------------
                    const p_xi = 0.5 * (pFlow[ip] - pFlow[im]);
                    const p_eta = 0.5 * (pFlow[jp] - pFlow[jm]);
                    const grad_p_x = metrics.xi_x[idx] * p_xi + metrics.eta_x[idx] * p_eta;
                    const grad_p_y = metrics.xi_y[idx] * p_xi + metrics.eta_y[idx] * p_eta;

                    // -------------------------------------------------
                    // Crank-Nicolson の陽的半分: (dt/2) * Lap(u^n) / (J^2 * Re)
                    //   Lap = alpha * u_xixi - 2*beta * u_xi_eta + gamma * u_etaeta
                    // -------------------------------------------------
                    const J2 = metrics.J[idx] ** 2;
                    const inv_J2Re = 1.0 / (J2 * Re);

                    const u_xi_eta_n = 0.25 * (uFlow[ipjp] - uFlow[ipjm] - uFlow[imjp] + uFlow[imjm]);
                    const v_xi_eta_n = 0.25 * (vFlow[ipjp] - vFlow[ipjm] - vFlow[imjp] + vFlow[imjm]);

                    const lap_u_n = (
                        metrics.alpha[idx] * (uFlow[ip] + uFlow[im] - 2.0 * uFlow[idx])
                        + metrics.gamma[idx] * (uFlow[jp] + uFlow[jm] - 2.0 * uFlow[idx])
                        - 2.0 * metrics.beta[idx] * u_xi_eta_n
                    ) * inv_J2Re;

                    const lap_v_n = (
                        metrics.alpha[idx] * (vFlow[ip] + vFlow[im] - 2.0 * vFlow[idx])
                        + metrics.gamma[idx] * (vFlow[jp] + vFlow[jm] - 2.0 * vFlow[idx])
                        - 2.0 * metrics.beta[idx] * v_xi_eta_n
                    ) * inv_J2Re;

                    // -------------------------------------------------
                    // 陽的 RHS (CN の陰的半分は GS で解く)
                    //   u* - (dt/2)*Lap(u*) = u^n + dt*(-AB_conv - grad_p + (1/2)*Lap_n)
                    // -------------------------------------------------
                    rhsU[idx] = uFlow[idx] + dt * (-ab_u - grad_p_x + 0.5 * lap_u_n);
                    rhsV[idx] = vFlow[idx] + dt * (-ab_v - grad_p_y + 0.5 * lap_v_n);
                }
            }

            // AB2 用に現ステップの移流項を保存
            convU_old.set(convU_n);
            convV_old.set(convV_n);
            isFirstStep = false;

            maxCflGlobal = localMaxCfl;
            maxDiffGlobal = localMaxDiff;

            // =====================================================================
            // Step 2: CN 陰的粘性 (Gauss-Seidel)
            //   係数が BE の半分 (dt/2) になる点のみ変更
            // =====================================================================
            uFlowTmp.set(rhsU);
            vFlowTmp.set(rhsV);

            for (let iter = 0; iter < 20; iter++) {
                for (let i = 1; i < imax - 1; i++) {
                    for (let j = 0; j < jmax; j++) {
                        const idx = getIdx(i, j);

                        const ip = getIdx(i + 1, j), im = getIdx(i - 1, j);
                        const jp = getIdx(i, j + 1), jm = getIdx(i, j - 1);
                        const ipjp = getIdx(i + 1, j + 1), ipjm = getIdx(i + 1, j - 1);
                        const imjp = getIdx(i - 1, j + 1), imjm = getIdx(i - 1, j - 1);

                        const u_xi_eta = 0.25 * (uFlowTmp[ipjp] - uFlowTmp[ipjm] - uFlowTmp[imjp] + uFlowTmp[imjm]);
                        const v_xi_eta = 0.25 * (vFlowTmp[ipjp] - vFlowTmp[ipjm] - vFlowTmp[imjp] + vFlowTmp[imjm]);

                        const J2 = metrics.J[idx] ** 2;

                        // Crank-Nicolson: dt/2 (後退オイラーの dt から変更)
                        const ax = 0.5 * dt * metrics.alpha[idx] / (J2 * Re);
                        const ay = 0.5 * dt * metrics.gamma[idx] / (J2 * Re);
                        const abeta = 0.5 * dt * metrics.beta[idx] / (J2 * Re);

                        const denom = 1.0 + 2.0 * ax + 2.0 * ay;

                        uFlowTmp[idx] = (
                            rhsU[idx]
                            + ax * (uFlowTmp[ip] + uFlowTmp[im])
                            + ay * (uFlowTmp[jp] + uFlowTmp[jm])
                            - 2.0 * abeta * u_xi_eta
                        ) / denom;

                        vFlowTmp[idx] = (
                            rhsV[idx]
                            + ax * (vFlowTmp[ip] + vFlowTmp[im])
                            + ay * (vFlowTmp[jp] + vFlowTmp[jm])
                            - 2.0 * abeta * v_xi_eta
                        ) / denom;
                    }
                }

                // 周期境界条件
                for (let i = 0; i < imax; i++) {
                    uFlowTmp[getIdx(i, jmax - 1)] = uFlowTmp[getIdx(i, 0)];
                    vFlowTmp[getIdx(i, jmax - 1)] = vFlowTmp[getIdx(i, 0)];
                }
                // 壁面 BC
                for (let j = 0; j < jmax; j++) {
                    uFlowTmp[getIdx(0, j)] = 0.0;
                    vFlowTmp[getIdx(0, j)] = 0.0;
                }
                // 遠方 BC
                for (let j = 0; j < jmax; j++) {
                    uFlowTmp[getIdx(imax - 1, j)] = u_inf_x;
                    vFlowTmp[getIdx(imax - 1, j)] = u_inf_y;
                }
            }

            // GS ループ後の BC 同期 (直接インデックスで確実に上書き)
            for (let j = 0; j < jmax; j++) {
                uFlowTmp[getIdx(0, j)] = 0.0;
                vFlowTmp[getIdx(0, j)] = 0.0;
            }
            for (let j = 0; j < jmax; j++) {
                uFlowTmp[getIdx(imax - 1, j)] = u_inf_x;
                vFlowTmp[getIdx(imax - 1, j)] = u_inf_y;
            }
            for (let i = 0; i < imax; i++) {
                uFlowTmp[i * jmax + (jmax - 1)] = uFlowTmp[i * jmax + 0];
                vFlowTmp[i * jmax + (jmax - 1)] = vFlowTmp[i * jmax + 0];
            }

            // =====================================================================
            // Step 3 以降: 発散・ポアソン・補正 (変更なし)
            // =====================================================================

            const JU = new Float64Array(size);
            const JV = new Float64Array(size);
            for (let i = 0; i < imax; i++) {
                for (let j = 0; j < jmax; j++) {
                    const idx = getIdx(i, j);
                    const J = metrics.J[idx];
                    JU[idx] = J * (metrics.xi_x[idx] * uFlowTmp[idx] + metrics.xi_y[idx] * vFlowTmp[idx]);
                    JV[idx] = J * (metrics.eta_x[idx] * uFlowTmp[idx] + metrics.eta_y[idx] * vFlowTmp[idx]);
                }
            }

            const s_a = 1.0;
            const s_d = Math.sqrt(2.0);
            const w_a = (1.0 / s_a) / ((1.0 / s_a) + (1.0 / s_d));
            const w_d = (1.0 / s_d) / ((1.0 / s_a) + (1.0 / s_d));
            const src = new Float64Array(size);

            for (let i = 1; i < imax - 1; i++) {
                for (let j = 1; j < jmax - 1; j++) {
                    const idx = getIdx(i, j);
                    const J = metrics.J[idx];
                    const ip = getIdx(i + 1, j), im = getIdx(i - 1, j);
                    const jp = getIdx(i, j + 1), jm = getIdx(i, j - 1);
                    const ipjp = getIdx(i + 1, j + 1), ipjm = getIdx(i + 1, j - 1);
                    const imjp = getIdx(i - 1, j + 1), imjm = getIdx(i - 1, j - 1);

                    const dJU_axial = (JU[ip] - JU[im]) * 0.5;
                    const dJU_diagonal = ((JU[ipjp] - JU[imjp]) + (JU[ipjm] - JU[imjm])) * 0.25;
                    const dJU_dxi = w_a * dJU_axial + w_d * dJU_diagonal;

                    const dJV_axial = (JV[jp] - JV[jm]) * 0.5;
                    const dJV_diagonal = ((JV[ipjp] - JV[ipjm]) + (JV[imjp] - JV[imjm])) * 0.25;
                    const dJV_deta = w_a * dJV_axial + w_d * dJV_diagonal;

                    src[idx] = (dJU_dxi + dJV_deta) / J;
                }
            }

            pCorr.fill(0.0);
            for (let iter = 0; iter < 50; iter++) {
                for (let i = 1; i < imax - 1; i++) {
                    for (let j = 0; j < jmax - 1; j++) {
                        const idx = getIdx(i, j);
                        const ip = getIdx(i + 1, j), im = getIdx(i - 1, j);
                        const jp = getIdx(i, j + 1), jm = getIdx(i, j - 1);
                        const ipjp = getIdx(i + 1, j + 1), ipjm = getIdx(i + 1, j - 1);
                        const imjp = getIdx(i - 1, j + 1), imjm = getIdx(i - 1, j - 1);

                        const pc_xi_eta = 0.25 * (pCorr[ipjp] - pCorr[ipjm] - pCorr[imjp] + pCorr[imjm]);
                        const denom = 2.0 * (metrics.alpha[idx] + metrics.gamma[idx]);
                        if (denom === 0) continue;

                        const target = (
                            metrics.alpha[idx] * (pCorr[ip] + pCorr[im])
                            + metrics.gamma[idx] * (pCorr[jp] + pCorr[jm])
                            - 2.0 * metrics.beta[idx] * pc_xi_eta
                            - (metrics.J[idx] ** 2) * src[idx] / dt
                        ) / denom;

                        pCorr[idx] += 1.0 * (target - pCorr[idx]);
                    }
                }

                for (let i = 0; i < imax; i++) {
                    pCorr[i * jmax + (jmax - 1)] = pCorr[i * jmax + 0];
                }
                for (let j = 0; j < jmax; j++) {
                    pCorr[getIdx(0, j)] = pCorr[getIdx(1, j)];
                }
                for (let j = 0; j < jmax; j++) {
                    pCorr[getIdx(imax - 1, j)] = 0.0;
                }
            }

            for (let i = 1; i < imax - 1; i++) {
                for (let j = 0; j < jmax - 1; j++) {
                    const idx = getIdx(i, j);
                    const ip = getIdx(i + 1, j), im = getIdx(i - 1, j);
                    const jp = getIdx(i, j + 1), jm = getIdx(i, j - 1);
                    const pc_xi = 0.5 * (pCorr[ip] - pCorr[im]);
                    const pc_eta = 0.5 * (pCorr[jp] - pCorr[jm]);

                    uFlow[idx] = uFlowTmp[idx] - dt * (metrics.xi_x[idx] * pc_xi + metrics.eta_x[idx] * pc_eta);
                    vFlow[idx] = vFlowTmp[idx] - dt * (metrics.xi_y[idx] * pc_xi + metrics.eta_y[idx] * pc_eta);
                    pFlow[idx] += pCorr[idx];
                }
            }

            for (let i = 0; i < imax; i++) {
                uFlow[i * jmax + (jmax - 1)] = uFlow[i * jmax + 0];
                vFlow[i * jmax + (jmax - 1)] = vFlow[i * jmax + 0];
                pFlow[i * jmax + (jmax - 1)] = pFlow[i * jmax + 0];
            }
            for (let j = 0; j < jmax; j++) {
                uFlow[getIdx(0, j)] = 0.0;
                vFlow[getIdx(0, j)] = 0.0;
            }
        }

        function getDiscreteColor(value, minV, maxV, mode) {
            let norm = (value - minV) / (maxV - minV || 1.0);
            norm = Math.min(1.0, Math.max(0.0, norm));
            const bands = 12;
            norm = Math.floor(norm * bands) / bands;

            let r = 0, g = 0, b = 0;
            if (mode === 'pressure') {
                if (norm < 0.15) { r = 100; g = 0; b = 200; }
                else if (norm < 0.35) { r = 0; g = 100; b = 255; }
                else if (norm < 0.50) { r = 0; g = 220; b = 255; }
                else if (norm < 0.65) { r = 0; g = 230; b = 100; }
                else if (norm < 0.80) { r = 240; g = 230; b = 0; }
                else if (norm < 0.93) { r = 255; g = 110; b = 0; }
                else { r = 255; g = 0; b = 0; }
            }
            else if (mode === 'velocity' || mode === 'cfl' || mode === 'diffusion') {
                if (norm < 0.08) { r = 15; g = 15; b = 90; }
                else if (norm < 0.20) { r = 0; g = 0; b = 230; }
                else if (norm < 0.35) { r = 0; g = 160; b = 255; }
                else if (norm < 0.50) { r = 0; g = 220; b = 80; }
                else if (norm < 0.65) { r = 230; g = 230; b = 0; }
                else if (norm < 0.82) { r = 255; g = 100; b = 0; }
                else if (norm < 0.95) { r = 255; g = 0; b = 0; }
                else { r = 255; g = 210; b = 210; }
            } else {
                if (norm < 0.3) { r = 40; g = 180; b = 40; }
                else if (norm < 0.6) { r = 230; g = 190; b = 0; }
                else { r = 230; g = 40; b = 40; }
            }
            return `rgba(${r}, ${g}, ${b}, 0.82)`;
        }

        // 幾何学的な座標の回転処理を行うヘルパー関数
        // 翼の前縁(rotCenterX, rotCenterY)を中心に、迎角(Alpha_AoA)分だけ時計回り(座標系としては逆方向)に傾ける
        function getRotatedPos(rawX, rawY) {
            const cosA = Math.cos(-Alpha_AoA);
            const sinA = Math.sin(-Alpha_AoA);
            const dx = rawX - rotCenterX;
            const dy = rawY - rotCenterY;
            return {
                x: offsetX + (rotCenterX + (dx * cosA - dy * sinA)) * scale,
                y: offsetY - (rotCenterY + (dx * sinA + dy * cosA)) * scale
            };
        }

        // 物理空間内の流速ベクトル(u, v)を画面回転に合わせて再投影するヘルパー関数
        function getRotatedVector(u, v) {
            const cosA = Math.cos(-Alpha_AoA);
            const sinA = Math.sin(-Alpha_AoA);
            return {
                u_rot: u * cosA - v * sinA,
                v_rot: u * sinA + v * cosA
            };
        }

        function renderGrid() {
            const viewMode = viewModeSelect.value;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. カラーマップ・レンダリング
            if (viewMode !== 'meshOnly') {
                for (let i = 0; i < imax - 1; i++) {
                    for (let j = 0; j < jmax - 1; j++) {
                        const idx00 = getIdx(i, j), idx10 = getIdx(i + 1, j);
                        const idx11 = getIdx(i + 1, j + 1), idx01 = getIdx(i, j + 1);

                        const p00 = getRotatedPos(gridX[idx00], gridY[idx00]);
                        const p10 = getRotatedPos(gridX[idx10], gridY[idx10]);
                        const p11 = getRotatedPos(gridX[idx11], gridY[idx11]);
                        const p01 = getRotatedPos(gridX[idx01], gridY[idx01]);

                        let color = "rgba(200,200,200,0.5)";

                        if (viewMode === 'velocity') {
                            const u = 0.25 * (uFlow[idx00] + uFlow[idx10] + uFlow[idx11] + uFlow[idx01]);
                            const v = 0.25 * (vFlow[idx00] + vFlow[idx10] + vFlow[idx11] + vFlow[idx01]);
                            // 表示する流速絶対値自体は回転に不変
                            color = getDiscreteColor(Math.hypot(u, v), 0.0, U_inf * 1.6, 'velocity');
                        } else if (viewMode === 'pressure') {
                            const p = 0.25 * (pFlow[idx00] + pFlow[idx10] + pFlow[idx11] + pFlow[idx01]);
                            color = getDiscreteColor(p, -0.6, 0.6, 'pressure');
                        } else if (viewMode === 'cfl') {
                            const stab00 = computeStabilityParameters(idx00);
                            const stab10 = computeStabilityParameters(idx10);
                            const stab11 = computeStabilityParameters(idx11);
                            const stab01 = computeStabilityParameters(idx01);
                            const avgCfl = 0.25 * (stab00.cfl + stab10.cfl + stab11.cfl + stab01.cfl);
                            color = getDiscreteColor(avgCfl, 0.0, 1.0, 'cfl');
                        } else if (viewMode === 'diffusion') {
                            const stab00 = computeStabilityParameters(idx00);
                            const stab10 = computeStabilityParameters(idx10);
                            const stab11 = computeStabilityParameters(idx11);
                            const stab01 = computeStabilityParameters(idx01);
                            const avgDiff = 0.25 * (stab00.diff + stab10.diff + stab11.diff + stab01.diff);
                            color = getDiscreteColor(avgDiff, 0.0, 0.25, 'diffusion');
                        } else if (viewMode === 'orthoSkew') {
                            const v1x = gridX[idx11] - gridX[idx00], v1y = gridY[idx11] - gridY[idx00];
                            const v2x = gridX[idx01] - gridX[idx10], v2y = gridY[idx01] - gridY[idx10];
                            const len1 = Math.hypot(v1x, v1y), len2 = Math.hypot(v2x, v2y);
                            color = getDiscreteColor((len1 > 0 && len2 > 0) ? Math.abs((v1x * v2x + v1y * v2y) / (len1 * len2)) : 0.0, 0, 1, 'skew');
                        } else if (viewMode === 'aspectRatio') {
                            const di = Math.hypot(gridX[idx10] - gridX[idx00], gridY[idx10] - gridY[idx00]);
                            const dj = Math.hypot(gridX[idx01] - gridX[idx00], gridY[idx01] - gridY[idx00]);
                            color = getDiscreteColor((di > 0 && dj > 0) ? Math.min(1.0, Math.abs(Math.log10(di / dj)) / 1.5) : 0.0, 0, 1, 'aspect');
                        }

                        ctx.fillStyle = color;
                        ctx.beginPath();
                        ctx.moveTo(p00.x, p00.y);
                        ctx.lineTo(p10.x, p10.y);
                        ctx.lineTo(p11.x, p11.y);
                        ctx.lineTo(p01.x, p01.y);
                        ctx.closePath();
                        ctx.fill();
                    }
                }
            }

            // 2. メッシュワイヤーフレーム
            ctx.strokeStyle = (viewMode === 'meshOnly') ? '#2c3e50' : 'rgba(30, 40, 50, 0.12)';
            ctx.lineWidth = 0.35;

            // 周方向
            for (let i = 0; i < imax; i++) {
                ctx.beginPath();
                for (let j = 0; j < jmax; j++) {
                    const idx = i * jmax + j;
                    const pt = getRotatedPos(gridX[idx], gridY[idx]);
                    if (j === 0) ctx.moveTo(pt.x, pt.y);
                    else ctx.lineTo(pt.x, pt.y);
                }
                ctx.stroke();
            }

            // 放射方向
            for (let j = 0; j < jmax; j++) {
                ctx.beginPath();
                for (let i = 0; i < imax; i++) {
                    const idx = i * jmax + j;
                    const pt = getRotatedPos(gridX[idx], gridY[idx]);
                    if (i === 0) ctx.moveTo(pt.x, pt.y);
                    else ctx.lineTo(pt.x, pt.y);
                }
                ctx.stroke();
            }

            // 3. 翼形状アウトライン（黒）
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            for (let j = 0; j < jmax; j++) {
                const pt = getRotatedPos(gridX[j], gridY[j]);
                if (j === 0) ctx.moveTo(pt.x, pt.y);
                else ctx.lineTo(pt.x, pt.y);
            }
            ctx.stroke();

            // 4. 情報表示パネル
            ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
            ctx.fillRect(15, 15, 250, 85);
            ctx.strokeStyle = "rgba(255, 255, 255, 0.2)";
            ctx.lineWidth = 1;
            ctx.strokeRect(15, 15, 250, 85);

            ctx.font = "bold 13px 'Courier New', monospace";
            ctx.fillStyle = "#ffffff";
            const currentAoaDeg = (Alpha_AoA * 180.0 / Math.PI).toFixed(1);
            ctx.fillText(`Angle of Attack:    ${currentAoaDeg}°`, 25, 35);

            ctx.fillStyle = (maxCflGlobal > 1.0) ? "#ff4d4d" : (maxCflGlobal > 0.7) ? "#ffcc00" : "#00ff66";
            ctx.fillText(`Max CFL (Courant):  ${maxCflGlobal.toFixed(4)}`, 25, 55);

            ctx.fillStyle = (maxDiffGlobal > 0.25) ? "#ff4d4d" : (maxDiffGlobal > 0.18) ? "#ffcc00" : "#00ff66";
            ctx.fillText(`Max Diffusion:      ${maxDiffGlobal.toFixed(4)}`, 25, 75);
        }

        function updateAndRender() {
            generateInitialAlgebraicGrid();
            renderGrid();
        }

        function setupLinkedInputs(rangeEl, numEl, isAoa = false) {
            rangeEl.addEventListener('input', () => {
                numEl.value = rangeEl.value;
                if (isAoa) {
                    updateCfdParamsFromUi();
                    renderGrid();
                } else {
                    updateAndRender();
                }
            });
            numEl.addEventListener('input', () => {
                rangeEl.value = numEl.value;
                if (isAoa) {
                    updateCfdParamsFromUi();
                    renderGrid();
                } else {
                    updateAndRender();
                }
            });
        }
        setupLinkedInputs(drRange, drNum, false);
        setupLinkedInputs(psiInput, psiNum, false);
        setupLinkedInputs(aoaRange, aoaNum, true);

        viewModeSelect.addEventListener('change', renderGrid);

        [reInput, dtInput].forEach(input => {
            input.addEventListener('input', () => {
                updateCfdParamsFromUi();
                renderGrid();
            });
        });

        [imaxInput, jmaxInput, mInput, pInput, xxInput].forEach(input => {
            input.addEventListener('input', updateAndRender);
        });

        solveEllipticBtn.addEventListener('click', () => {
            smoothGridElliptic(50);
            renderGrid();
        });

        function cfdLoop() {
            if (!isCfdRunning) return;
            for (let step = 0; step < 3; step++) {
                stepFlowSolver();
            }
            renderGrid();
            requestAnimationFrame(cfdLoop);
        }

        toggleCfdBtn.addEventListener('click', () => {
            isCfdRunning = !isCfdRunning;
            if (isCfdRunning) {
                toggleCfdBtn.innerText = "CFD計算 停止";
                toggleCfdBtn.style.background = "#c0392b";
                cfdLoop();
            } else {
                toggleCfdBtn.innerText = "CFD計算 開始";
                toggleCfdBtn.style.background = "#e67e22";
            }
        });

        resetCfdBtn.addEventListener('click', () => {
            initCfdBuffers();
            renderGrid();
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left, mouseY = e.clientY - rect.top;

            // 現在の描画上の回転中心からの相対位置を計算してズーム
            const physX = (mouseX - offsetX) / scale;
            const physY = (offsetY - mouseY) / scale;
            if (e.deltaY < 0) scale = Math.min(10000, scale * 1.1);
            else scale = Math.max(10, scale / 1.1);
            offsetX = mouseX - physX * scale; offsetY = mouseY + physY * scale;
            renderGrid();
        });

        canvas.addEventListener('mousedown', (e) => { isDragging = true; startX = e.clientX; startY = e.clientY; });
        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            offsetX += e.clientX - startX; offsetY += e.clientY - startY;
            startX = e.clientX; startY = e.clientY;
            renderGrid();
        });
        window.addEventListener('mouseup', () => { isDragging = false; });

        updateCfdParamsFromUi();
        updateAndRender();
    </script>
</body>
</html>
